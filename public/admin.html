<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Ronald & Grace</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="/guests.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5A3;
      --brown-dark: #1A0F0A;
      --brown-mid: #2C1810;
      --brown-light: #4A2E1A;
      --text-primary: #F5ECD7;
      --text-secondary: #C4A882;
      --text-muted: #8B6F4E;
      --surface: rgba(44, 24, 16, 0.6);
      --surface-hover: rgba(60, 36, 20, 0.8);
      --border: rgba(201, 169, 110, 0.2);
      --border-hover: rgba(201, 169, 110, 0.5);
      --success: #4CAF7D;
      --success-bg: rgba(76, 175, 125, 0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--brown-dark);
      color: var(--text-primary);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(201,169,110,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(201,169,110,0.04) 0%, transparent 50%);
    }

    /* ── Header ── */
    .header {
      background: rgba(26, 15, 10, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-brand .icon {
      font-size: 22px;
    }
    .header-brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold-light);
    }
    .header-brand span {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.05em;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Main Layout ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 11px 14px 11px 40px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--gold); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #A07840);
      color: #1A0F0A;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-ghost:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      color: var(--text-primary);
    }
    .btn-success {
      background: var(--success-bg);
      border: 1px solid rgba(76,175,125,0.3);
      color: var(--success);
    }
    .btn-wa {
      background: rgba(37, 211, 102, 0.12);
      border: 1px solid rgba(37, 211, 102, 0.25);
      color: #25D366;
    }
    .btn-wa:hover { background: rgba(37, 211, 102, 0.2); }
    .btn-sm {
      padding: 7px 13px;
      font-size: 12px;
      border-radius: 8px;
    }
    .btn-icon { font-size: 15px; }

    /* ── Guest Grid ── */
    .guest-grid {
      display: grid;
      gap: 12px;
    }

    .guest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      transition: border-color 0.2s, background 0.2s;
      animation: cardIn 0.3s ease both;
    }
    .guest-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .guest-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), #7A5A2A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .guest-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .guest-code {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
      background: rgba(255,255,255,0.04);
      padding: 2px 7px;
      border-radius: 4px;
      margin-top: 2px;
      display: inline-block;
    }

    .card-link-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .link-display {
      flex: 1;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Empty State ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: #2C1810;
      border: 1px solid var(--border-hover);
      border-radius: 18px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold-light);
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--text-muted); }

    /* ── Result Box ── */
    .result-box {
      background: rgba(201,169,110,0.06);
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      display: none;
    }
    .result-box.show { display: block; }
    .result-box .label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .result-box .link-val {
      font-size: 13px;
      font-family: monospace;
      color: var(--gold);
      word-break: break-all;
      margin-bottom: 12px;
    }
    .snippet-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      font-family: monospace;
      color: #9CDCFE;
      white-space: pre;
      margin-top: 12px;
      overflow-x: auto;
    }
    .snippet-label { font-size: 11px; color: var(--text-muted); margin-top: 12px; margin-bottom: 6px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(44,24,16,0.95);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    @media (max-width: 540px) {
      .main { padding: 20px 16px; }
      .stats-bar { grid-template-columns: repeat(3,1fr); gap: 8px; }
      .stat-card { padding: 12px; }
      .stat-card .num { font-size: 22px; }
      .header-brand h1 { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="icon">💍</span>
      <div>
        <h1>Ronald & Grace — Admin</h1>
        <span>Manajemen Undangan</span>
      </div>
    </div>
    <div class="header-actions">
      <a href="/" target="_blank" class="btn btn-ghost btn-sm">
        <span>🔗</span> Lihat Undangan
      </a>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">
        <span>＋</span> Tambah Tamu
      </button>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">Total Tamu</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statBase">0</div>
      <div class="label">Data Tetap</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statLocal">0</div>
      <div class="label">Ditambah Baru</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Cari nama tamu..."
        oninput="renderGuests()"
      />
    </div>
    <button class="btn btn-ghost btn-sm" onclick="clearSearch()">Reset</button>
  </div>

  <!-- Guest List -->
  <div class="section-title">Daftar Tamu</div>
  <div class="guest-grid" id="guestGrid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="icon">👥</div>
    <p>Tidak ada tamu yang cocok dengan pencarian.</p>
  </div>

</main>

<!-- Modal Tambah Tamu -->
<div class="modal-overlay" id="addModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>✦ Tambah Tamu Baru</h2>

    <div class="form-group">
      <label class="form-label" for="guestNameInput">Nama Tamu</label>
      <input
        type="text"
        class="form-input"
        id="guestNameInput"
        placeholder="cth: Bapak Gubernur"
        onkeydown="if(event.key==='Enter') addGuest()"
      />
    </div>

    <div class="form-group">
      <label class="form-label">Kode URL (otomatis)</label>
      <input
        type="text"
        class="form-input"
        id="guestCodeInput"
        placeholder="akan di-generate otomatis"
        style="font-family: monospace;"
      />
    </div>

    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:4px;">
      <button class="btn btn-ghost" onclick="closeAddModal()">Batal</button>
      <button class="btn btn-primary" onclick="addGuest()">Generate & Tambah</button>
    </div>

    <!-- Result setelah tambah -->
    <div class="result-box" id="resultBox">
      <div class="label">🎉 Tamu berhasil ditambahkan!</div>
      <div class="link-val" id="resultLink"></div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" onclick="copyResultLink()">📋 Copy Link</button>
        <button class="btn btn-wa btn-sm" onclick="shareResultWa()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          WhatsApp
        </button>
      </div>

      <div class="snippet-label">📌 Salin kode ini ke <code>public/guests.js</code> atau App.jsx agar permanen:</div>
      <div class="snippet-box" id="resultSnippet"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const BASE_URL = 'https://ronald-grace.vercel.app'
  const LS_KEY   = 'admin_extra_guests'

  // ── Merge base guests + localStorage guests ──────────────────
  function getAllGuests() {
    const base  = window.GUESTS || {}
    let extra = {}
    try { extra = JSON.parse(localStorage.getItem(LS_KEY) || '{}') } catch {}
    return { ...base, ...extra }
  }

  function getExtraGuests() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}') } catch { return {} }
  }

  // ── Render ───────────────────────────────────────────────────
  function renderGuests() {
    const all    = getAllGuests()
    const extra  = getExtraGuests()
    const base   = window.GUESTS || {}
    const query  = document.getElementById('searchInput').value.toLowerCase()

    // Update stats
    const totalKeys = Object.keys(all).length
    document.getElementById('statTotal').textContent = totalKeys
    document.getElementById('statBase').textContent  = Object.keys(base).length
    document.getElementById('statLocal').textContent = Object.keys(extra).length

    const grid  = document.getElementById('guestGrid')
    const empty = document.getElementById('emptyState')
    grid.innerHTML = ''

    const filtered = Object.entries(all).filter(([code, name]) =>
      name.toLowerCase().includes(query) || code.toLowerCase().includes(query)
    )

    if (filtered.length === 0) {
      empty.style.display = 'block'
      return
    }
    empty.style.display = 'none'

    filtered.forEach(([code, name], idx) => {
      const link    = `${BASE_URL}/${code}`
      const isExtra = !!extra[code]
      const card    = document.createElement('div')
      card.className = 'guest-card'
      card.style.animationDelay = `${idx * 30}ms`
      card.innerHTML = `
        <div class="card-top">
          <div class="guest-info">
            <div class="avatar">👤</div>
            <div>
              <div class="guest-name">${escHtml(name)}</div>
              <div class="guest-code">${code}${isExtra ? ' · baru' : ''}</div>
            </div>
          </div>
        </div>
        <div class="card-link-row">
          <div class="link-display" title="${link}">${link}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="copyLink('${link}')">
            📋 Copy Link
          </button>
          <button class="btn btn-wa btn-sm" onclick="shareWa('${escHtml(name)}','${link}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            WhatsApp
          </button>
          ${isExtra ? `<button class="btn btn-sm" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171;" onclick="deleteGuest('${code}')">🗑</button>` : ''}
        </div>
      `
      grid.appendChild(card)
    })
  }

  // ── Actions ─────────────────────────────────────────────────
  function copyLink(link) {
    navigator.clipboard.writeText(link).then(() => showToast('✅ Link berhasil di-copy!'))
  }

  function shareWa(name, link) {
    const msg = `Kepada Yth. ${name},\nberikut link undangan pernikahan kami:\n${link}`
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank')
  }

  function deleteGuest(code) {
    if (!confirm('Hapus tamu ini dari daftar sementara?')) return
    const extra = getExtraGuests()
    delete extra[code]
    localStorage.setItem(LS_KEY, JSON.stringify(extra))
    renderGuests()
    showToast('🗑 Tamu dihapus dari daftar sementara')
  }

  function clearSearch() {
    document.getElementById('searchInput').value = ''
    renderGuests()
  }

  // ── Modal ────────────────────────────────────────────────────
  function openAddModal() {
    document.getElementById('guestNameInput').value = ''
    document.getElementById('guestCodeInput').value = generateCode()
    document.getElementById('resultBox').classList.remove('show')
    document.getElementById('addModal').classList.add('open')
    setTimeout(() => document.getElementById('guestNameInput').focus(), 200)
  }

  function closeAddModal() {
    document.getElementById('addModal').classList.remove('open')
    renderGuests()
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('addModal')) closeAddModal()
  }

  function generateCode() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'
    const all = getAllGuests()
    let code
    do {
      code = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('')
    } while (all[code])
    return code
  }

  function addGuest() {
    const name = document.getElementById('guestNameInput').value.trim()
    let   code = document.getElementById('guestCodeInput').value.trim()

    if (!name) {
      document.getElementById('guestNameInput').focus()
      showToast('⚠️ Masukkan nama tamu terlebih dahulu')
      return
    }
    if (!code || code.length < 2) code = generateCode()

    // Save to localStorage
    const extra = getExtraGuests()
    extra[code] = name
    localStorage.setItem(LS_KEY, JSON.stringify(extra))

    // Show result
    const link = `${BASE_URL}/${code}`
    document.getElementById('resultLink').textContent = link
    document.getElementById('resultSnippet').textContent = `  "${code}": "${name}",`
    document.getElementById('resultBox').classList.add('show')
    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth', block: 'nearest' })

    showToast('🎉 Tamu ditambahkan!')
  }

  let resultLinkTemp = ''
  let resultNameTemp = ''

  function copyResultLink() {
    const link = document.getElementById('resultLink').textContent
    navigator.clipboard.writeText(link).then(() => showToast('✅ Link di-copy!'))
  }

  function shareResultWa() {
    const link = document.getElementById('resultLink').textContent
    const name = document.getElementById('guestNameInput').value.trim()
    const msg  = `Kepada Yth. ${name},\nberikut link undangan pernikahan kami:\n${link}`
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank')
  }

  // ── Toast ─────────────────────────────────────────────────────
  let toastTimer
  function showToast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.add('show')
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500)
  }

  // ── Helpers ──────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ── Init ─────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', renderGuests)
</script>
</body>
</html>
